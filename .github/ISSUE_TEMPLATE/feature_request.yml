name: Feature request
description: Suggest a new convention, hook, agent, or workflow for the template.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The pain point or workflow gap you hit while using the template.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you add or change? Be specific about files affected.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.

  - type: checkboxes
    id: scope-check
    attributes:
      label: Scope check
      description: This template stays lean and Python-focused. Please confirm.
      options:
        - label: This is generally useful, not specific to one project or framework.
        - label: This is not already covered by an installable plugin (e.g. [whetstone](https://github.com/iliaal/whetstone)).
