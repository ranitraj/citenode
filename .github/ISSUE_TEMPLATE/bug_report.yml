name: Bug report
description: Report a problem with the template (init.py, hooks, agents, conventions, etc.).
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please give enough context to reproduce.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A short description of the bug.
      placeholder: e.g. `python3 init.py` fails when DDD is declined.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands or actions.
      placeholder: |
        1. Clone the template
        2. Run `python3 init.py`
        3. Decline DDD at the prompt
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      validations:
        required: true

  - type: input
    id: version
    attributes:
      label: Template version / commit
      description: Output of `git rev-parse HEAD` or the release tag you used.
      placeholder: e.g. v1.0.0 or 9c2982a

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, uv version.
      placeholder: macOS 14.5, Python 3.12.3, uv 0.4.1
